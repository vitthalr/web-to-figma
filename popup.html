<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e1e1e;
      color: #e0e0e0;
      padding: 20px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .header svg { flex-shrink: 0; }
    .header h1 { font-size: 16px; font-weight: 600; color: #fff; }
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 8px;
    }
    .btn-primary { background: #a259ff; color: #fff; }
    .btn-primary:hover { background: #8b3ee6; }
    .btn-primary:disabled { background: #555; cursor: not-allowed; }
    .status {
      font-size: 12px;
      padding: 8px;
      border-radius: 6px;
      margin-top: 10px;
      display: none;
      word-break: break-all;
    }
    .status.show { display: block; }
    .status.info { background: #1a3a4a; color: #7ec8e3; }
    .status.success { background: #1a3a2a; color: #7ee3a0; }
    .status.error { background: #3a1a1a; color: #e37e7e; }
    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #a0a0a0;
      margin-bottom: 4px;
    }
    .field input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #444;
      border-radius: 6px;
      background: #2a2a2a;
      color: #fff;
      font-size: 13px;
      outline: none;
    }
    .field input:focus { border-color: #a259ff; }
    .field input::placeholder { color: #666; }
    .help {
      font-size: 11px;
      color: #666;
      margin-top: 12px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="header">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
      <rect width="24" height="24" rx="4" fill="#a259ff"/>
      <path d="M8 4h3.5a3.5 3.5 0 0 1 0 7H8V4z" fill="#fff" opacity="0.8"/>
      <path d="M8 11h3.5a3.5 3.5 0 0 1 0 7H8v-7z" fill="#fff" opacity="0.6"/>
    </svg>
    <h1>Web to Figma</h1>
  </div>

  <div class="field">
    <label>Capture ID</label>
    <input type="text" id="captureId" placeholder="Paste capture ID from Copilot">
  </div>

  <button class="btn btn-primary" id="captureBtn">Capture to Figma</button>

  <div class="status" id="status"></div>

  <div class="help">
    <strong>How to use:</strong><br>
    1. Ask Copilot: "generate a capture ID"<br>
    2. Paste the ID above<br>
    3. Click "Capture to Figma"<br>
    4. Accept the debugger prompt<br>
    5. Tell Copilot to check status
  </div>

  <script src="popup.js"></script>
</body>
</html>
